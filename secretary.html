<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secretary Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
    color: rgb(26, 10, 10);
}
table {
  font-size: 12px;
}
table th, table td {
  padding:4px 6px !important;
  vertical-align: middle;
}
#table {
  white-space: nowrap;
}
.box {
  overflow-x: auto;
}

.logo {
    text-align: center;
    margin-bottom: 80px;
}

.logo img {
    width: 120px;
}

/* MENU */
.menu {
    margin-top: 20px;
}

.menu a {
    display: block;
    padding: 15px 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    color: rgb(20, 1, 1);
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 20px;
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 40px;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="Green-Logo.png">
    </div>

    <div class="menu">
        <a href="index.html">🏠 Home</a>
        <a href="patient.html">🧑 Patient Form</a>
        <a href="doctor.html">👨‍⚕️ Doctor</a>
        <a href="secretary.html">📋 Secretary</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="box">

        <h4 class="mb-3">Secretary Panel</h4>

        <input type="text" id="search" class="form-control mb-3" placeholder="🔍 Search patient...">

        <table id="table" class="table table-bordered table-sm"></table>

    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxFOQixOtBwLDwCoaxFAhwHorFuQeLNxuvXUtmlP5N-8GMR3tfDqNDMwjmChKSU7_TScg/exec";

// ================= AGE =================
function computeAge(birthday) {
  if (!birthday) return "";

  let bday = new Date(birthday);
  if (isNaN(bday.getTime())) return "";

  let today = new Date();
  let age = today.getFullYear() - bday.getFullYear();
  let m = today.getMonth() - bday.getMonth();

  if (m < 0 || (m === 0 && today.getDate() < bday.getDate())) {
    age--;
  }

  return age;
}

// ================= FORMAT DATE =================
function formatDate(value) {
  if (!value) return "";

  let d = new Date(value);
  if (isNaN(d.getTime())) return value;

  let year = d.getFullYear();
  let month = String(d.getMonth() + 1).padStart(2, '0');
  let day = String(d.getDate()).padStart(2, '0');

  let hours = d.getHours();
  let minutes = String(d.getMinutes()).padStart(2, '0');

  let ampm = hours >= 12 ? 'PM' : 'AM';
  hours = hours % 12;
  hours = hours ? hours : 12;

  return `${month}/${day}/${year} ${hours}:${minutes} ${ampm}`;
}

// ================= LOAD =================
async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const tableBody = document.getElementById("table-body");
  const tableHead = document.getElementById("table-head");

  tableBody.innerHTML = "";
  tableHead.innerHTML = "";

  const headers = data[0];

  const updatedHeaders = headers.map(h => {
    if (h === "Birth Day") return "Age";
    return h;
  });

  // HEADER
  let trHead = document.createElement("tr");
  updatedHeaders.forEach(header => {
    let th = document.createElement("th");
    th.innerText = header;
    trHead.appendChild(th);
  });
  tableHead.appendChild(trHead);

  // BODY
  data.slice(1).forEach((row, rowIndex) => {
    let tr = document.createElement("tr");

    row.forEach((cell, colIndex) => {
      let td = document.createElement("td");
      let header = headers[colIndex];

      if (header === "Birth Day") {
        td.innerText = computeAge(cell) + " yrs";
      }

      else if (header === "Schedule Time&Date") {
        td.innerText = formatDate(cell);
      }

      else if (header === "Meet link") {
        td.innerHTML = cell 
          ? `<a href="${cell}" target="_blank" style="color:blue;">Join Meet</a>` 
          : "";
      }

      // 🔥 SENT BUTTON LOGIC
      else if (header === "Sent") {

        if (cell === "SENT") {
          td.innerText = "SENT";
          td.style.color = "green";
          td.style.fontWeight = "bold";
        } else {
          td.innerHTML = `<button onclick="sendNow(${rowIndex + 1})">SEND</button>`;
        }
      }

      else {
        td.innerText = cell;
      }

      tr.appendChild(td);
    });

    tableBody.appendChild(tr);
  });
}

// ================= SEND BUTTON =================
function sendNow(rowIndex) {

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "send",
      row: rowIndex
    })
  })
  .then(res => res.text())
  .then(data => {
    console.log("Sent:", data);
    loadData();
  })
  .catch(err => console.error(err));
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("keyup", function() {
  let value = this.value.toLowerCase();
  let rows = document.querySelectorAll("#table-body tr");

  rows.forEach(row => {
    let text = row.innerText.toLowerCase();
    row.style.display = text.includes(value) ? "" : "none";
  });
});

// ================= AUTO REFRESH =================
setInterval(loadData, 10000);

// INIT
loadData();
</script>



</body>
</html>
