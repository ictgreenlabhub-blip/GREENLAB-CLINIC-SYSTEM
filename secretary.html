<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secretary Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
    color: rgb(26, 10, 10);
}
table {
  font-size: 12px;
}
table th, table td {
  padding:4px 6px !important;
  vertical-align: middle;
}
#table {
  white-space: nowrap;
}
.box {
  overflow-x: auto;
}

.logo {
    text-align: center;
    margin-bottom: 80px;
}

.logo img {
    width: 120px;
}

/* MENU */
.menu {
    margin-top: 20px;
}

.menu a {
    display: block;
    padding: 15px 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    color: rgb(20, 1, 1);
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 20px;
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 40px;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="Green-Logo.png">
    </div>

    <div class="menu">
        <a href="index.html">🏠 Home</a>
        <a href="patient.html">🧑 Patient Form</a>
        <a href="doctor.html">👨‍⚕️ Doctor</a>
        <a href="secretary.html">📋 Secretary</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="box">

        <h4 class="mb-3">Secretary Panel</h4>

        <input type="text" id="search" class="form-control mb-3" placeholder="🔍 Search patient...">

        <table id="table" class="table table-bordered table-sm"></table>

    </div>

</div>

<script>

// 🔥 PALITAN MO LANG ITO NG URL MO
const API_URL = "https://script.google.com/macros/s/AKfycbxFOQixOtBwLDwCoaxFAhwHorFuQeLNxuvXUtmlP5N-8GMR3tfDqNDMwjmChKSU7_TScg/exec";


// ================= FORMAT DATE =================
function formatDate(value) {
  if (!value) return "";

  const d = new Date(value);

  if (isNaN(d)) return value;

  return d.toLocaleString("en-US", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}


// ================= LOAD DATA =================
function loadData() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      let html = "";

      data.forEach((row, i) => {

        if (i === 0) {
          html += "<tr>" + row.map(col => `<th>${col}</th>`).join("") + "<th>Schedule</th></tr>";
        } else {

          html += "<tr>";

          row.forEach((col, colIndex) => {

            // 🔥 FORMAT LANG (WALANG BINAGO SA LOGIC)
            if (colIndex === 0 || colIndex === 4 || colIndex === 12) {
              col = formatDate(col);
            }

            html += `<td>${col || ""}</td>`;
          });

          // ✅ HINDI GINALAW — SAME LOGIC MO
          html += `
            <td>
              <input type="datetime-local" onchange="saveSchedule(this, ${i})">
            </td>
          `;

          html += "</tr>";
        }

      });

      document.getElementById("table").innerHTML = html;

    });
}


// ================= SAVE (WALANG BINAGO) =================
function saveSchedule(input, index) {
  const value = input.value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      row: index,
      schedule: value
    })
  })
  .then(res => res.text())
  .then(data => {
    console.log("Saved:", data);
    loadData();
  })
  .catch(err => console.error("Error:", err));
}


// ================= INIT =================
loadData();

</script>



</body>
</html>
