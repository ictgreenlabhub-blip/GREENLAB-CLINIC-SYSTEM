<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secretary Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
    color: rgb(26, 10, 10);
}
table {
  font-size: 12px;
}
table th, table td {
  padding:4px 6px !important;
  vertical-align: middle;
}
#table {
  white-space: nowrap;
}
.box {
  overflow-x: auto;
}

.logo {
    text-align: center;
    margin-bottom: 80px;
}

.logo img {
    width: 120px;
}

/* MENU */
.menu {
    margin-top: 20px;
}

.menu a {
    display: block;
    padding: 15px 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    color: rgb(20, 1, 1);
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 20px;
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 40px;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="Green-Logo.png">
    </div>

    <div class="menu">
        <a href="index.html">🏠 Home</a>
        <a href="patient.html">🧑 Patient Form</a>
        <a href="doctor.html">👨‍⚕️ Doctor</a>
        <a href="secretary.html">📋 Secretary</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="box">

    <h4>Secretary Panel</h4>

    <table class="table table-bordered table-sm">
      <thead>
        <tr>
          <th>Email</th>
          <th>Name</th>
          <th>Age</th>
          <th>Schedule</th>
          <th>Meet</th>
          <th>Send</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>

  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby1baRbs6wKdkv_v6vIgwHyGEAM2DV3pxwUSI_pUebgrnTgDuXela9H5SK-Uv9grEjq2w/exec";

// AGE
function computeAge(bday){
  if(!bday) return "";
  let birth = new Date(bday);
  let today = new Date();

  let age = today.getFullYear() - birth.getFullYear();
  let m = today.getMonth() - birth.getMonth();

  if(m < 0 || (m === 0 && today.getDate() < birth.getDate())){
    age--;
  }
  return age;
}

// LOAD DATA
async function loadData(){
  const res = await fetch(API_URL);
  const data = await res.json();

  const table = document.getElementById("table-body");
  table.innerHTML = "";

  for(let i=1;i<data.length;i++){
    let row = data[i];

    let email = row[1];
    let name = row[2];
    let birthday = row[4];
    let schedule = row[12];
    let meet = row[13];
    let status = row[14];

    let age = computeAge(birthday);

    table.innerHTML += `
      <tr>
        <td>${email}</td>
        <td>${name}</td>
        <td>${age}</td>

        <td>
          <input type="datetime-local"
          value="${schedule ? schedule.substring(0,16) : ""}"
          id="sched-${i}">
        </td>

        <td>
          ${meet ? `<a href="${meet}" target="_blank">Open</a>` : ""}
        </td>

        <td id="sendcol-${i}">
          ${
            status === "SENT"
            ? `<span class="badge bg-success">SENT</span>`
            : `<button class="btn btn-success btn-sm" onclick="sendData(${i})">Send</button>`
          }
        </td>

      </tr>
    `;
  }
}

// SEND BUTTON
async function sendData(rowIndex){

  let sched = document.getElementById("sched-"+rowIndex).value;

  await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify({
      action:"send",
      row: rowIndex,
      schedule: sched
    })
  });

  document.getElementById("sendcol-"+rowIndex).innerHTML =
    `<span class="badge bg-success">SENT</span>`;
}

loadData();
</script>



</body>
</html>
