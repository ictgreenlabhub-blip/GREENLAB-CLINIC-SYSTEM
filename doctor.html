<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
    color: rgb(26, 10, 10);
}

.logo {
    text-align: center;
    margin-bottom: 50px;
}

.logo img {
    width: 120px;
}

.menu a {
    display: block;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    color: black;
    text-decoration: none;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 40px;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    overflow-x: auto;
}

table {
  width:100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  border:1px solid #ddd;
  padding:6px;
}

button {
  padding:5px 10px;
  border:none;
  background:#16a395;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

button:hover {
  background:#128a7e;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <h3>GreenLab</h3>
    </div>

    <div class="menu">
        <a href="index.html">🏠 Home</a>
        <a href="patient.html">🧑 Patient</a>
        <a href="doctor.html">👨‍⚕️ Doctor</a>
        <a href="secretary.html">📄 Secretary</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">
<div class="box">

<h3>Doctor Panel</h3>

<input type="text" id="search" placeholder="Search patient..." onkeyup="search()">

<br><br>

<table id="table"></table>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxFOQixOtBwLDwCoaxFAhwHorFuQeLNxuvXUtmlP5N-8GMR3tfDqNDMwjmChKSU7_TScg/exec";

let DATA = [];

// ================= LOAD =================
function loadData() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      DATA = data;
      renderTable(data);
    });
}

// ================= TABLE =================
function renderTable(data) {

  let html = `
  <tr>
    <th>Timestamp</th>
    <th>Name</th>
    <th>Age</th>
    <th>Sex</th>
    <th>Weight</th>
    <th>Temperature</th>
    <th>Blood Pressure</th>
    <th>Schedule</th>
    <th>Meet</th>
    <th>Notes</th>
    <th>Action</th>
  </tr>
  `;

  data.slice(1).forEach((r, i) => {

    html += `
    <tr>
      <td>${formatDate(r[0])}</td>
      <td>${r[2]}</td>
      <td>${computeAge(r[4])}</td>
      <td>${r[6]}</td>

      <td>${r[9] || ""}</td> <!-- WEIGHT -->
      <td>${r[10] || ""}</td> <!-- TEMP -->
      <td>${r[11] || ""}</td> <!-- BP -->

      <td>${formatDate(r[12])}</td>
      <td><a href="${r[13]}" target="_blank">Open</a></td>

      <td>${r[19] || ""}</td>

      <td>
        <button onclick="view(${i+2})">View</button>
      </td>
    </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
}

// ================= VIEW =================
function view(row) {
  alert("Next step: Prescription / MedCert page (gagawin natin next)");
}

// ================= AGE =================
function computeAge(bday) {
  if (!bday) return "";
  let birth = new Date(bday);
  let today = new Date();

  let age = today.getFullYear() - birth.getFullYear();
  let m = today.getMonth() - birth.getMonth();

  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) {
    age--;
  }

  return age;
}

// ================= DATE FORMAT =================
function formatDate(d) {
  if (!d) return "";
  let date = new Date(d);

  return date.toLocaleString("en-PH", {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

// ================= SEARCH =================
function search() {
  let val = document.getElementById("search").value.toLowerCase();

  let filtered = DATA.filter(r =>
    (r[2] || "").toLowerCase().includes(val)
  );

  renderTable([DATA[0], ...filtered]);
}

loadData();

</script>

</body>
</html>
