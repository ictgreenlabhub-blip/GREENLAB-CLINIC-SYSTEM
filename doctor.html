<!DOCTYPE html>
<html>
<head>
<title>Doctor Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar {
  width:250px;
  height:100vh;
  position:fixed;
  background: linear-gradient(180deg,#c4e479,#16a395);
  padding:25px 15px;
}

.menu a {
  display:block;
  padding:12px;
  margin-bottom:10px;
  text-decoration:none;
  color:black;
  border-radius:8px;
}

.menu a:hover {
  background:rgba(255,255,255,0.2);
}

.logo {
  text-align: center;
  margin-bottom: 80px;
}

.logo img {
  width: 120px;
}

/* CONTENT */
.content {
  margin-left:270px;
  padding:30px;
}

/* BOX */
.box {
  background:white;
  padding:20px;
  border-radius:15px;
}

/* TABLE */
table {
  font-size:12px;
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:4px 6px;
  white-space:nowrap;
  text-align:left;
}

td {
  max-width:120px;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* COLORS */
.schedule-ok {
  color:green;
  font-weight:bold;
}

.schedule-none {
  color:gray;
}

button {
  padding:3px 8px;
  font-size:11px;
  background:#16a395;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

a {
  color:#16a395;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="sidebar">
  <div class="logo">
    <img src="Green-Logo.png">
  </div>

  <div class="menu">
    <a href="patient.html">🧑 GreenLab Patient Portal</a>
    <a href="doctor.html">👨‍⚕️ Doctor</a>
    <a href="secretary.html">📋 Secretary</a>
  </div>
</div>

<div class="content">
<div class="box">

<h3>Doctor Panel</h3>

<table id="table" border="1"></table>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwlCQ6JZwL4Z0EuOHQTddKOiz-wBfchozjwgEl8_uE9n1gpEn_5f6hzAZIcOjiKMB7Ojg/exec";

let patientData = [];

/* LOAD DATA */
fetch(API_URL)
.then(res=>res.json())
.then(data=>{

  patientData = data;

  let html = `
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>Sex</th>
    <th>Weight</th>
    <th>Temp</th>
    <th>BP</th>
    <th>Schedule</th>
    <th>Meet</th>
    <th>PDF</th>
    <th>Send</th>
    <th>Action</th>
  </tr>`;

  data.slice(1).forEach((r,i)=>{

    let schedule = r[12];
    let meet = r[13];

    let scheduleDisplay = "No Schedule";
    let scheduleClass = "schedule-none";

    if(schedule){
      let d = new Date(schedule);
      if(!isNaN(d)){
        scheduleDisplay = d.toLocaleString("en-PH");
        scheduleClass = "schedule-ok";
      }
    }

    html += `
    <tr>
      <td>${r[2]||""}</td>
      <td>${computeAge(r[4])}</td>
      <td>${r[6]||""}</td>
      <td>${r[9]||""}</td>
      <td>${r[10]||""}</td>
      <td>${r[11]||""}</td>

      <td class="${scheduleClass}">
        ${scheduleDisplay}
      </td>

      <td>
        ${meet ? `<a href="${meet}" target="_blank">Open</a>` : "-"}
      </td>

      <!-- PDF -->
      <td>
        ${r[19] ? `<a href="${r[19]}" target="_blank">View</a>` : "-"}
      </td>

      <!-- SEND -->
      <td>
        ${r[20] === "SENT"
          ? `<span style="color:green;font-weight:bold;">SENT</span>`
          : `<button onclick="send(${i+2})">Send</button>`}
      </td>

      <!-- ✅ FIXED ACTION -->
      <td>
        <button onclick="openRX(${i+2})">🧾 Prescription</button>
      </td>

    </tr>`;
  });

  document.getElementById("table").innerHTML = html;

});


/* ✅ FIXED OPEN PRESCRIPTION */
function openRX(row){
  window.location.href = "prescription.html?row=" + row;
}


/* AGE */
function computeAge(bday){
  if(!bday) return "";
  let d=new Date(bday);
  if(isNaN(d)) return "";
  return new Date().getFullYear()-d.getFullYear();
}


/* SEND */
function send(row){

  if(!confirm("Send prescription to patient?")) return;

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({
      action:"sendPrescription",
      row: row
    })
  })
  .then(()=> {
    alert("✅ Sent!");
    location.reload();
  })
  .catch(()=>{
    alert("❌ Error sending");
  });
}

</script>

</body>
</html>
