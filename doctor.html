<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
}

.logo {
    text-align: center;
    margin-bottom: 40px;
}

.menu a {
    display: block;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    color: black;
    text-decoration: none;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 40px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    overflow-x: auto;
}

table {
  width:100%;
  border-collapse: collapse;
  font-size: 12px;
}

th, td {
  border:1px solid #ddd;
  padding:6px;
}

button {
  padding:5px 10px;
  border:none;
  background:#16a395;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

button:hover {
  background:#128a7e;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <h3>GreenLab</h3>
  </div>

  <div class="menu">
    <a href="index.html">🏠 Home</a>
    <a href="patient.html">🧑 Patient</a>
    <a href="doctor.html">👨‍⚕️ Doctor</a>
    <a href="secretary.html">📄 Secretary</a>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
<div class="box">

<h3>Doctor Panel</h3>

<input type="text" id="search" placeholder="Search..." onkeyup="search()">

<br><br>

<table id="table"></table>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxFOQixOtBwLDwCoaxFAhwHorFuQeLNxuvXUtmlP5N-8GMR3tfDqNDMwjmChKSU7_TScg/exec";

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

  let html = `
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>Sex</th>
    <th>Weight</th>
    <th>Temp</th>
    <th>BP</th>
    <th>Schedule</th>
    <th>Action</th>
  </tr>`;

  data.slice(1).forEach((r,i)=>{

    html += `
    <tr>
      <td>${r[2]}</td>
      <td>${computeAge(r[4])}</td>
      <td>${r[6]}</td>
      <td>${r[9]||""}</td>
      <td>${r[10]||""}</td>
      <td>${r[11]||""}</td>
      <td>${formatDate(r[12])}</td>
      <td>
        <button onclick="openRX(${i+1})">Prescription</button>
      </td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;

});

function openRX(row){
  window.location.href = "prescription.html?row="+row;
}

function computeAge(bday){
  if(!bday) return "";
  let birth=new Date(bday);
  let today=new Date();
  return today.getFullYear()-birth.getFullYear();
}

function formatDate(d){
  if(!d) return "";
  return new Date(d).toLocaleString("en-PH");
}

</script>

</body>
</html>
