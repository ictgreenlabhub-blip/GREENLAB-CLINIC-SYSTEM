<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GreenLab Patient Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#c4e479,#16a395);
  padding:25px 15px;
}

.logo{
  text-align:center;
  margin-bottom:80px;
}
.logo img{
  width:120px;
}

/* CONTENT */
.content{
  margin-left:270px;
  padding:50px;
}

/* CENTER SCREEN */
.center-box{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
  gap:40px;
}

/* BIG BUTTONS */
.big-btn{
  width:220px;
  height:150px;
  border-radius:20px;
  font-size:20px;
  font-weight:bold;
  border:none;
  color:white;
  transition:0.3s;
}

.login-btn{ background:#16a395; }
.create-btn{ background:#2e7d32; }

.big-btn:hover{
  transform:scale(1.05);
}

/* FORM */
.form-box{
  max-width:700px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 2px 12px rgba(0,0,0,0.1);
}

/* LOGIN BOX */
.login-box{
  max-width:350px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 2px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <img src="Green-Logo.png">
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- 🔥 CHOICE SCREEN -->
  <div id="choiceBox" class="center-box">
    <button class="big-btn login-btn" onclick="showLogin()">Login</button>
    <button class="big-btn create-btn" onclick="showForm()">+ Create</button>
  </div>

  <!-- 🔐 LOGIN -->
  <div id="loginBox" style="display:none;">
    <div class="login-box">
      <h4 class="mb-3">Patient Login</h4>

      <input id="email" class="form-control mb-2" placeholder="Email">
      <input id="password" type="password" class="form-control mb-3" placeholder="Password">

      <button class="btn btn-success w-100" onclick="login()">Login</button>

      <button class="btn btn-link w-100 mt-2" onclick="back()">← Back</button>
    </div>
  </div>

  <!-- 📝 FORM -->
  <div id="formBox" style="display:none;">
    <div class="form-box">

      <h4 class="mb-3">Patient Information</h4>

      <form id="form">
        <input class="form-control mb-2" name="name" placeholder="Full Name" required>
        <input class="form-control mb-2" name="email" placeholder="Email">
        <input class="form-control mb-2" name="phone" placeholder="Phone Number">
        <input class="form-control mb-2" name="address" placeholder="Address">

        <label>Birthday</label>
        <input type="date" class="form-control mb-2" name="birthday">

        <label>Gender</label>
        <select class="form-control mb-2" name="gender">
          <option>Male</option>
          <option>Female</option>
        </select>

        <label>Civil Status</label>
        <select class="form-control mb-2" name="status">
          <option>Single</option>
          <option>Married</option>
          <option>Widowed</option>
          <option>Child</option>
        </select>

        <input class="form-control mb-2" name="weight" placeholder="Weight">
        <input class="form-control mb-2" name="temperature" placeholder="Temperature">
        <input class="form-control mb-2" name="bp" placeholder="Blood Pressure">

        <button class="btn btn-success w-100">Submit</button>
      </form>

      <p id="msg" class="mt-3 text-success"></p>

      <button class="btn btn-link w-100 mt-2" onclick="back()">← Back</button>

    </div>
  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw-sdPvipu6F0PQ1LTzMRoRxAyt23AhSH8e-a2yYsMq2AhLuzuCXkfGBaX5Ly2Au747Aw/exec";

/* SWITCH */
function showLogin(){
  document.getElementById("choiceBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

function showForm(){
  document.getElementById("choiceBox").style.display="none";
  document.getElementById("formBox").style.display="block";
}

function back(){
  document.getElementById("choiceBox").style.display="flex";
  document.getElementById("loginBox").style.display="none";
  document.getElementById("formBox").style.display="none";
}

/* LOGIN */
function login(){

  let email = document.getElementById("email").value.trim().toLowerCase();
  let password = document.getElementById("password").value;

  if(password !== "1234"){
    alert("Wrong password ❌");
    return;
  }

  fetch(API_URL)
  .then(res=>res.json())
  .then(data=>{

    let found = data.some((r,i)=>{
      if(i===0) return false;
      return (r[1]||"").toLowerCase() === email;
    });

    if(!found){
      alert("Email not found ❌");
      return;
    }

    alert("Login success ✅");

  });

}

/* SUBMIT FORM */
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let formData = new FormData(this);

  fetch(API_URL,{
    method:"POST",
    body:formData
  })
  .then(res=>res.text())
  .then(()=>{
    document.getElementById("formBox").innerHTML =
      "<h2 style='text-align:center'>✅ Thank you!</h2>";
  });

});

</script>

</body>
</html>
