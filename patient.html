
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GreenLab Patient Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
}

.logo {
    text-align: center;
    margin-bottom: 80px;
}

.logo img {
    width: 120px;
}

.menu a {
    display: block;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    color: black;
    text-decoration: none;
}

.content {
    margin-left: 270px;
    padding: 50px;
}

.form-box {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
}

#loginBox {
    position: fixed;
    right: 20px;
    top: 100px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 250px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

#dashboard {
    display: none;
    margin-top: 20px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="Green-Logo.png">
    </div>

    <div class="menu">
        <a href="#">🧑 Patient Portal</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

<div id="formBox" class="form-box">

<h4>Patient Information</h4>

<form id="form">

<input class="form-control mb-2" name="name" placeholder="Full Name" required>
<input class="form-control mb-2" name="email" placeholder="Email" required>
<input class="form-control mb-2" name="phone" placeholder="Phone">

<input class="form-control mb-2" name="address" placeholder="Address">

<label>Birthday</label>
<input type="date" class="form-control mb-2" name="birthday" required>

<label>Gender</label>
<select class="form-control mb-2" name="gender">
<option>Male</option>
<option>Female</option>
</select>

<input class="form-control mb-2" name="weight" placeholder="Weight">
<input class="form-control mb-2" name="temperature" placeholder="Temperature">
<input class="form-control mb-2" name="bp" placeholder="Blood Pressure">

<button class="btn btn-success w-100">Submit</button>

</form>

</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <h4>Your History</h4>
    <div id="timeline"></div>
</div>

</div>

<!-- LOGIN BOX -->
<div id="loginBox">

<h5>Patient Login</h5>

<input id="email" class="form-control mb-2" placeholder="Email">
<input id="bday" type="date" class="form-control mb-2">

<button onclick="login()" class="btn btn-success w-100">Login</button>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyKc-drGdsGoTBgU3VPTcjAecrE7ltzReWEubKh7Cpw09XuEghc5eKOT8RfSNRmIgDe9w/exec";

// ================= SUBMIT =================
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: formData
    })
    .then(() => {
        document.getElementById("formBox").innerHTML = `
        <div style="text-align:center;padding:50px;">
          <h1 style="color:#16a395;">THANK YOU!</h1>
        </div>`;
    });

});

// ================= LOGIN =================
function login(){

  let email = document.getElementById("email").value.toLowerCase();
  let bday = document.getElementById("bday").value;

  fetch(API_URL)
  .then(res=>res.json())
  .then(data=>{

    let user = data.find(r => {

      let e = (r[1]||"").toLowerCase();

      let d = "";
      if(r[4]){
        let date = new Date(r[4]);
        if(!isNaN(date)){
          d = date.toISOString().split("T")[0];
        }
      }

      return e === email && d === bday;
    });

    if(!user){
      alert("Invalid login ❌");
      return;
    }

    alert("Login success ✅");

    localStorage.setItem("email", email);

    document.getElementById("formBox").style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadDashboard(email);

  });

}

// ================= DASHBOARD =================
function loadDashboard(email){

  fetch(API_URL)
  .then(res=>res.json())
  .then(data=>{

    let html = "<table class='table table-bordered'><tr><th>Date</th><th>Prescription</th></tr>";

    data.slice(1).forEach(r=>{

      if((r[1]||"").toLowerCase() === email){

        html += `
        <tr>
          <td>${new Date(r[0]).toLocaleString()}</td>
          <td>${r[16] || "-"}</td>
        </tr>`;
      }

    });

    html += "</table>";

    document.getElementById("timeline").innerHTML = html;

  });

}

// ================= AUTO LOGIN =================
window.onload = function(){

  let email = localStorage.getItem("email");

  if(email){

    document.getElementById("formBox").style.display = "none";
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadDashboard(email);

  }

}

</script>

</body>
</html>
