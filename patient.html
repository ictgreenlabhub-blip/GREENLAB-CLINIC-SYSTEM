<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GreenLab Patient Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ================= BODY ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #16a395, #0d6efd);
    padding: 25px;
    color: white;
}

.logo {
    text-align: center;
    margin-bottom: 40px;
}

.logo img {
    width: 110px;
}

.menu a {
    display: block;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 18px;
}

/* ================= CONTENT ================= */
.content {
    margin-left: 270px;
    padding: 40px;
}

/* ================= CARD ================= */
.card-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    animation: fadeIn 0.5s ease;
}

/* ================= TITLE ================= */
h4 {
    font-weight: 600;
    color: #2c3e50;
}

/* ================= TABLE ================= */
.table-box {
    overflow-x: auto;
}

.table {
    font-size: 12px;
    border-radius: 10px;
    overflow: hidden;
}

.table th, .table td {
    padding: 6px;
    white-space: nowrap;
}

.table th {
    background: #ecf0f1;
    font-weight: bold;
}

/* hover effect */
.table tbody tr:hover {
    background: #f1f9f8;
}

/* ================= BUTTON ================= */
button, .btn {
    border-radius: 10px !important;
}

/* ================= FLOATING BUTTON ================= */
#createBtn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    font-size: 28px;
    color: white;
    background: #16a395;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
    transition: 0.3s;
}

/* hover */
#createBtn:hover {
    transform: scale(1.1);
}

/* pulse animation */
#createBtn {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {box-shadow: 0 0 0 0 rgba(22,163,149,0.7);}
    70% {box-shadow: 0 0 0 15px rgba(22,163,149,0);}
    100% {box-shadow: 0 0 0 0 rgba(22,163,149,0);}
}

/* ================= QUICK FORM ================= */
#quickForm {
    position: fixed;
    bottom: 100px;
    right: 30px;
    width: 280px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 3px 15px rgba(0,0,0,0.2);
    display: none;
    animation: fadeIn 0.3s ease;
}

/* ================= LOGIN / CREATE ================= */
.choice-box {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 120px;
}

.choice-btn {
    width: 200px;
    height: 120px;
    border-radius: 20px;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn {
    background: linear-gradient(135deg, #0d6efd, #16a395);
}

.create-btn {
    background: linear-gradient(135deg, #28a745, #16a395);
}

.choice-btn:hover {
    transform: scale(1.08);
}

/* ================= ANIMATION ================= */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="Green-Logo.png">
    </div>

    <div class="menu">
        <a href="#">🧑 Patient Portal</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- CHOICE -->
<div id="choiceBox" class="choice-box">
    <button class="choice-btn login-btn" onclick="showLogin()">Login</button>
    <button class="choice-btn create-btn" onclick="showForm()">+ Create</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="card-box" style="display:none;">
    <h4>Patient Login</h4>
    <input id="loginEmail" class="form-control mb-2" placeholder="Email">
    <input id="loginPass" type="password" class="form-control mb-2" placeholder="Password">
    <button class="btn btn-success w-100" onclick="loginUser()">Login</button>
    <p class="mt-2"><a href="#" onclick="back()">← Back</a></p>
</div>

<!-- FORM -->
<div id="formBox" class="card-box" style="display:none;">
    <h4>Patient Form</h4>

    <form id="form">
        <input name="name" class="form-control mb-2" placeholder="Full Name" required>
        <input name="email" class="form-control mb-2" placeholder="Email" required>
        <input name="phone" class="form-control mb-2" placeholder="Phone">
        <input name="address" class="form-control mb-2" placeholder="Address">
        <input name="birthday" type="date" class="form-control mb-2">

        <select name="gender" class="form-control mb-2">
            <option>Male</option>
            <option>Female</option>
        </select>

        <select name="status" class="form-control mb-2">
            <option>Single</option>
            <option>Married</option>
        </select>

        <input name="weight" class="form-control mb-2" placeholder="Weight">
        <input name="temperature" class="form-control mb-2" placeholder="Temperature">
        <input name="bp" class="form-control mb-2" placeholder="BP">

        <button class="btn btn-success w-100">Submit</button>
    </form>

    <p id="msg"></p>
    <p class="mt-2"><a href="#" onclick="back()">← Back</a></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;" class="table-box"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw-sdPvipu6F0PQ1LTzMRoRxAyt23AhSH8e-a2yYsMq2AhLuzuCXkfGBaX5Ly2Au747Aw/exec";
let patientData = [];

/* LOAD DATA */
window.onload = function(){
    fetch(API_URL)
    .then(res=>res.json())
    .then(data=>{
        patientData = data;
        console.log("loaded");
    });
}

/* NAVIGATION */
function showLogin(){
    hideAll();
    document.getElementById("loginBox").style.display="block";
}

function showForm(){
    hideAll();
    document.getElementById("formBox").style.display="block";
}

function back(){
    hideAll();
    document.getElementById("choiceBox").style.display="flex";
}

function hideAll(){
    document.getElementById("choiceBox").style.display="none";
    document.getElementById("loginBox").style.display="none";
    document.getElementById("formBox").style.display="none";
    document.getElementById("dashboard").style.display="none";
}

/* LOGIN */
function loginUser(){

    let email = document.getElementById("loginEmail").value.trim().toLowerCase();
    let pass = document.getElementById("loginPass").value;

    if(pass !== "1234"){
        alert("Wrong password");
        return;
    }

    let found = false;

    patientData.forEach((r,i)=>{
        if(i===0) return;

        let rowEmail = (r[1]||"").toString().trim().toLowerCase();

        if(rowEmail === email){
            found = true;
        }
    });

    if(!found){
        alert("Email not found");
        return;
    }

    loadDashboard(email);
}

/* DASHBOARD */
function loadDashboard(email){

    hideAll();
    document.getElementById("dashboard").style.display="block";

    // ✅ FORMAT FUNCTIONS
    let formatDate = (d) => {
        if(!d) return "-";
        return new Date(d).toLocaleDateString("en-PH", {
            year: "numeric",
            month: "short",
            day: "numeric"
        });
    };

    let formatDateTime = (d) => {
        if(!d) return "-";
        return new Date(d).toLocaleString("en-PH", {
            year: "numeric",
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit"
        });
    };

    // ================= ACTIVE TABLE =================
    let activeHTML = `
    <h4>Active</h4>
    <div class="table-box">
    <table class="table table-bordered table-sm">
    <tr>
        <th>Timestamp</th>
        <th>Email</th>
        <th>Name</th>
        <th>Address</th>
        <th>Birthday</th>
        <th>Phone</th>
        <th>Gender</th>
        <th>Status</th>
        <th>Procedure</th>
        <th>Weight</th>
        <th>Temp</th>
        <th>BP</th>
        <th>Schedule</th>
        <th>Meet</th>
        <th>PDF</th>
    </tr>`;

    // ================= HISTORY TABLE =================
    let historyHTML = `
    <h4 class="mt-5">History</h4>
    <div class="table-box">
    <table class="table table-bordered table-sm">
    <tr>
        <th>Timestamp</th>
        <th>Email</th>
        <th>Name</th>
        <th>Address</th>
        <th>Birthday</th>
        <th>Phone</th>
        <th>Gender</th>
        <th>Status</th>
        <th>Procedure</th>
        <th>Weight</th>
        <th>Temp</th>
        <th>BP</th>
        <th>Schedule</th>
        <th>Meet</th>
        <th>PDF</th>
    </tr>`;

    // ================= LOOP =================
    patientData.forEach((r,i)=>{

        if(i===0) return;

        let rowEmail = (r[1]||"").toString().trim().toLowerCase();
        if(rowEmail !== email) return;

        let timestamp = formatDateTime(r[0]);
        let bday = formatDate(r[4]);
        let schedule = formatDateTime(r[12]);

        let meet = r[13] ? `<a href="${r[13]}" target="_blank">Join</a>` : "-";
        let pdf = r[19] ? `<a href="${r[19]}" target="_blank">View</a>` : "-";

        let rowHTML = `
        <tr>
            <td>${timestamp}</td>
            <td>${r[1]}</td>
            <td>${r[2]}</td>
            <td>${r[3]}</td>
            <td>${bday}</td>
            <td>${r[5]}</td>
            <td>${r[6]}</td>
            <td>${r[7]}</td>
            <td>${r[8]}</td>
            <td>${r[9]}</td>
            <td>${r[10]}</td>
            <td>${r[11]}</td>
            <td>${schedule}</td>
            <td>${meet}</td>
            <td>${pdf}</td>
        </tr>`;

        // ✅ ACTIVE vs HISTORY
        if(r[13]){
            activeHTML += rowHTML;
        } else {
            historyHTML += rowHTML;
        }

    });

    activeHTML += "</table></div>";
    historyHTML += "</table></div>";

    document.getElementById("dashboard").innerHTML = activeHTML + historyHTML;
}

/* SUBMIT */
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch(API_URL,{
        method:"POST",
        body:formData
    })
    .then(()=>{
        document.getElementById("msg").innerHTML="✅ Submitted!";
        this.reset();
    });
});

</script>

</body>
</html>
