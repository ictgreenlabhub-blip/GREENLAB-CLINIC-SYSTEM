<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GreenLab Patient Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
    color: rgb(26, 10, 10);
}
table {
  font-size: 12px;
}
table th, table td {
  padding:4px 6px !important;
  vertical-align: middle;
}
#table {
  white-space: nowrap;
}
.box {
  overflow-x: auto;
}

.logo {
    text-align: center;
    margin-bottom: 80px;
}

.logo img {
    width: 120px;
}

/* MENU */
.menu {
    margin-top: 20px;
}

.menu a {
    display: block;
    padding: 15px 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    color: rgb(20, 1, 1);
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 20px;
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 40px;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- CHOICE -->
<div id="choiceBox" class="center-box">
    <button class="choice-btn login-btn" onclick="showLogin()">Login</button>
    <button class="choice-btn create-btn" onclick="showForm()">+ Create</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="card-box" style="display:none;">
    <h4>Patient Login</h4>
    <input id="loginEmail" class="form-control mb-2" placeholder="Email">
    <input id="loginPass" type="password" class="form-control mb-2" placeholder="Password">
    <button class="btn btn-success w-100" onclick="login()">Login</button>
    <p class="mt-2"><a href="#" onclick="back()">← Back</a></p>
</div>

<!-- FORM -->
<div id="formBox" class="card-box" style="display:none;">
    <h4>Patient Form</h4>

    <form id="form">
        <input name="name" class="form-control mb-2" placeholder="Full Name" required>
        <input name="email" class="form-control mb-2" placeholder="Email" required>
        <input name="phone" class="form-control mb-2" placeholder="Phone">
        <input name="address" class="form-control mb-2" placeholder="Address">
        <input name="birthday" type="date" class="form-control mb-2">

        <select name="gender" class="form-control mb-2">
            <option>Male</option>
            <option>Female</option>
        </select>

        <select name="status" class="form-control mb-2">
            <option>Single</option>
            <option>Married</option>
        </select>

        <input name="weight" class="form-control mb-2" placeholder="Weight">
        <input name="temperature" class="form-control mb-2" placeholder="Temperature">
        <input name="bp" class="form-control mb-2" placeholder="BP">

        <button class="btn btn-success w-100">Submit</button>
    </form>

    <p id="msg"></p>
    <p class="mt-2"><a href="#" onclick="back()">← Back</a></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none; padding:30px;"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw-sdPvipu6F0PQ1LTzMRoRxAyt23AhSH8e-a2yYsMq2AhLuzuCXkfGBaX5Ly2Au747Aw/exec";
let patientData = [];

/* LOAD DATA ONCE */
window.onload = function(){
    fetch(API_URL)
    .then(res=>res.json())
    .then(data=>{
        patientData = data;
        console.log("Data loaded ✅");
    });
}

/* NAVIGATION */
function showLogin(){
    document.getElementById("choiceBox").style.display="none";
    document.getElementById("loginBox").style.display="block";
}

function showForm(){
    document.getElementById("choiceBox").style.display="none";
    document.getElementById("formBox").style.display="block";
}

function back(){
    document.getElementById("choiceBox").style.display="flex";
    document.getElementById("loginBox").style.display="none";
    document.getElementById("formBox").style.display="none";
}

/* LOGIN */
function login(){

    let email = document.getElementById("loginEmail").value.trim().toLowerCase();
    let pass = document.getElementById("loginPass").value;

    if(pass !== "1234"){
        alert("Wrong password ❌");
        return;
    }

    if(patientData.length === 0){
        alert("Loading data ⏳");
        return;
    }

    let found = false;

    patientData.forEach((r,i)=>{
        if(i===0) return;

        let rowEmail = (r[1]||"").toString().trim().toLowerCase();

        if(rowEmail === email){
            found = true;
        }
    });

    if(!found){
        alert("Email not found ❌");
        return;
    }

    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";

    loadDashboard(email);
}

/* DASHBOARD */
function loadDashboard(email){

    let html = `
    <h4>Patient Records</h4>
    <table class="table table-bordered">
    <tr>
      <th>Timestamp</th>
      <th>Email</th>
      <th>Name</th>
      <th>Procedure</th>
      <th>Weight</th>
      <th>Temp</th>
      <th>BP</th>
      <th>Schedule</th>
      <th>Meet</th>
      <th>PDF</th>
    </tr>`;

    patientData.forEach((r,i)=>{

        if(i===0) return;

        let rowEmail = (r[1]||"").toString().trim().toLowerCase();

        if(rowEmail !== email) return;

        let schedule = r[12] ? new Date(r[12]).toLocaleString() : "-";
        let meet = r[13] ? `<a href="${r[13]}" target="_blank">Join</a>` : "-";
        let pdf = r[19] ? `<a href="${r[19]}" target="_blank">View</a>` : "-";

        html += `
        <tr>
          <td>${r[0]}</td>
          <td>${r[1]}</td>
          <td>${r[2]}</td>
          <td>${r[8]}</td>
          <td>${r[9]}</td>
          <td>${r[10]}</td>
          <td>${r[11]}</td>
          <td>${schedule}</td>
          <td>${meet}</td>
          <td>${pdf}</td>
        </tr>`;
    });

    html += "</table>";

    document.getElementById("dashboard").innerHTML = html;
}

/* SUBMIT FORM */
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch(API_URL,{
        method:"POST",
        body:formData
    })
    .then(()=> {
        document.getElementById("msg").innerHTML="✅ Submitted!";
        document.getElementById("form").reset();
    });
});

</script>

</body>
</html>
