<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GreenLab Patient Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
    color: rgb(26, 10, 10);
}

.logo {
    text-align: center;
    margin-bottom: 80px;
}

.logo img {
    width: 120px;
}

/* MENU */
.menu {
    margin-top: 20px;
}

.menu a {
    display: block;
    padding: 15px 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    color: rgb(20, 1, 1);
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 20px;
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 50px;
}

/* FORM BOX */
.form-box {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- LOGIN BUTTON -->
<div style="position:absolute; top:20px; right:20px;">
  <button onclick="showLogin()">Login</button>
</div>

<!-- LOGIN BOX -->
<div id="loginBox" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
background:white; padding:25px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.2); z-index:1000;">

<h4>Patient Login</h4>
<input id="email" class="form-control mb-2" placeholder="Email">
<input id="bday" class="form-control mb-2" placeholder="Birthday YYYY-MM-DD">

<button onclick="login()" class="btn btn-success w-100">Login</button>

</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="Green-Logo.png">
    </div>

    <div class="menu">
        <a href="patient.html">🧑 GreenLab Patient Portal</a>
        <a href="doctor.html">👨‍⚕️ Doctor</a>
        <a href="secretary.html">📋 Secretary</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- FORM -->
<div class="form-box" id="formBox">

<h4 class="mb-3">Patient Information</h4>

<form id="form">
<input class="form-control mb-2" name="name" placeholder="Full Name" required>
<input class="form-control mb-2" name="email" placeholder="Email">
<input class="form-control mb-2" name="phone" placeholder="Phone Number">
<input class="form-control mb-2" name="address" placeholder="Address">

<label>Birthday</label>
<input type="date" class="form-control mb-2" name="birthday">

<label>Gender</label>
<select class="form-control mb-2" name="gender">
<option>Male</option>
<option>Female</option>
</select>

<label>Civil Status</label>
<select class="form-control mb-2" name="status">
<option>Single</option>
<option>Married</option>
<option>Widowed</option>
<option>Child</option>
</select>

<input class="form-control mb-2" name="weight" placeholder="Weight">
<input class="form-control mb-2" name="temperature" placeholder="Temperature">
<input class="form-control mb-2" name="bp" placeholder="Blood Pressure">

<label>Procedure</label>
<input class="form-control mb-3" name="procedure" value="Consultation">

<button class="btn btn-success w-100">Submit</button>

</form>

<p id="msg" class="mt-3 text-success"></p>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
<h3>My Consultation History</h3>
<div id="timeline"></div>
</div>

</div>

<script>

// 👉 API
const API_URL = "https://script.google.com/macros/s/AKfycbyKc-drGdsGoTBgU3VPTcjAecrE7ltzReWEubKh7Cpw09XuEghc5eKOT8RfSNRmIgDe9w/exec";

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch(API_URL, {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("msg").innerHTML = "✅ Submitted successfully!";
        document.getElementById("form").reset();
    });
});

// LOGIN SHOW
function showLogin(){
  document.getElementById("loginBox").style.display = "block";
}

// LOGIN
function login(){

  let email = document.getElementById("email").value;
  let bday = document.getElementById("bday").value;

  fetch(API_URL)
  .then(res=>res.json())
  .then(data=>{

    let user = data.find(r => (r[1] && r[1].toString().toLowerCase() ==
    email.toLowerCase()) && 
    (r[4] && r[4].toLocaleString().includes(bday))
  );
    if(!user){
      alert("Invalid login");
      return;
    }

    localStorage.setItem("userEmail", email);

    showPatientView();
    loadDashboard(email);

    document.getElementById("loginBox").style.display = "none";

  });
}

// HIDE SIDEBAR
function showPatientView(){
  document.querySelector(".sidebar").style.display = "none";
  document.getElementById("formBox").style.display = "none";
}

// LOAD DASHBOARD
function loadDashboard(email){

  fetch(API_URL)
  .then(res=>res.json())
  .then(data=>{

    let html = "";

    data.slice(1).forEach(r=>{

      if(r[1] == email){

        html += `
        <div style="background:white;padding:15px;margin-bottom:10px;border-left:5px solid #16a395;">
          <div>${new Date(r[0]).toLocaleString()}</div>
          <div>${r[16]||""}</div>
          <div>${r[13] ? `<a href="${r[13]}" target="_blank">Join Meet</a>` : ""}</div>
        </div>`;
      }

    });

    document.getElementById("timeline").innerHTML = html;
    document.getElementById("dashboard").style.display = "block";

  });
}

// AUTO LOGIN
window.onload = function(){
  let email = localStorage.getItem("userEmail");
  if(email){
    showPatientView();
    loadDashboard(email);
  }
}

</script>

</body>
</html>
