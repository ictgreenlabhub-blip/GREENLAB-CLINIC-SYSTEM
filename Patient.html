<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Form</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
    color: rgb(26, 10, 10);
}

.logo {
    text-align: center;
    margin-bottom: 80px;
}

.logo img {
    width: 120px;
}
/* MENU */
.menu {
    margin-top: 20px;
}
.menu a {
  display: block;
    padding: 15px 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    color: rgb(20, 1, 1);
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 20px;
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 50px;
}

/* FORM BOX */
.form-box {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
</style></head><body><!-- SIDEBAR --><div class="sidebar">
    <div class="logo">
        <img src="Green-Logo.png">
    </div><div class="menu">
    <a href="index.html">🏠 Home</a>
    <a href="patient.html">🧑 Patient Form</a>
    <a href="doctor.html">👨‍⚕️ Doctor</a>
    <a href="secretary.html">📋 Secretary</a>
</div>

</div><!-- CONTENT --><div class="content"><div class="form-box">
<h4 class="mb-3">Patient Information</h4><form id="form"><input class="form-control mb-2" name="name" placeholder="Full Name" required>
<input class="form-control mb-2" name="email" placeholder="Email">
<input class="form-control mb-2" name="phone" placeholder="Phone Number">
<input class="form-control mb-2" name="address" placeholder="Address"><label>Birthday</label>
<input type="date" class="form-control mb-2" name="birthday">

<label>Gender</label>
<select class="form-control mb-2" name="gender">

<option>Male</option>
<option>Female</option>
</select><label>Civil Status</label>
<select class="form-control mb-2" name="status">

<option>Single</option>
<option>Married</option>
<option>Widowed</option>
<option>Child</option>
</select><input class="form-control mb-2" name="weight" placeholder="Weight">
<input class="form-control mb-2" name="temperature" placeholder="Temperature">
<input class="form-control mb-2" name="bp" placeholder="Blood Pressure"><label>Procedure</label>
<input class="form-control mb-3" name="procedure" value="Consultation">

<button class="btn btn-success w-100">Submit</button>

</form><p id="msg" class="mt-3 text-success"></p></div></div><script>

// 👉 PALITAN MO NG APPS SCRIPT LINK MO
const scriptURL = "https://script.google.com/macros/s/AKfycbyKc-drGdsGoTBgU3VPTcjAecrE7ltzReWEubKh7Cpw09XuEghc5eKOT8RfSNRmIgDe9w/exec";

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch(scriptURL, {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("msg").innerHTML = "✅ Submitted successfully!";
        document.getElementById("form").reset();
    })
    .catch(err => {
        document.getElementById("msg").innerHTML = "❌ Error submitting!";
    });
});

</script></body>
</html>
