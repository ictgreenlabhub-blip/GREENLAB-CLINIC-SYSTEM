<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prescription</title>

<style>
body{
  background:#f4f6f9;
  font-family: Arial;
}

/* PAPER */
.paper{
  width:8.5in;
  min-height:11in;
  margin:auto;
  background:white;
  padding:40px 60px;
  position:relative;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:20px;
}

.logo{
  width:100px;
}

.title{
  font-size:20px;
  font-weight:bold;
  color:#2e7d32;
}

.sub{
  font-size:13px;
}

/* ROW */
.row{
  margin-top:15px;
}

/* RX WATERMARK */
.rx{
  position:absolute;
  top:300px;
  left:60px;
  font-size:120px;
  color:#ccc;
  opacity:0.2;
}

/* INPUT */
textarea{
  width:100%;
  border:none;
  outline:none;
  font-size:15px;
  background:transparent;
}

input, select{
  border:none;
  border-bottom:1px solid black;
  font-size:15px;
  outline:none;
  background:transparent;
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:10px 20px;
  background:#2e7d32;
  color:white;
  border:none;
  cursor:pointer;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:60px;
  right:60px;
  text-align:center;
}
</style>

</head>

<body>

<!-- 🔥 HIDDEN FRAME (NO NEW TAB) -->
<iframe name="hiddenFrame" style="display:none;"></iframe>

<form action="https://script.google.com/macros/s/AKfycbwlCQ6JZwL4Z0EuOHQTddKOiz-wBfchozjwgEl8_uE9n1gpEn_5f6hzAZIcOjiKMB7Ojg/exec" method="POST" target="hiddenFrame">

<input type="hidden" name="action" value="saveWithPDF">
<input type="hidden" name="row" id="rowInput">

<div class="paper">

<!-- HEADER -->
<div class="header">
  <img src="Greenlab-logo.png" class="logo">
  <div>
    <div class="title">GREEN LAB CLINIC AND WELLNESS HUB</div>
    <div class="sub">
      Purok 4, Apokon Tagum City<br>
      Globe: 0905-240-6557<br>
      greenlabhub@gmail.com
    </div>
  </div>
</div>

<!-- INFO -->
<div class="row">
  Patient Name: <b id="name"></b> |
  Age: <b id="age"></b> |
  Sex: <b id="sex"></b>
</div>

<div class="row">
  Address: <b id="address"></b> |
  Date: <b id="date"></b>
</div>

<!-- RX -->
<div class="rx">Rx</div>

<!-- PROCEDURE -->
<div class="row">
  Procedure:
  <select name="procedure">
    <option>Select</option>
    <option>X-RAY</option>
    <option>LAB</option>
    <option>ULTRASOUND</option>
    <option>ECG</option>
  </select>
</div>

<!-- PRESCRIPTION -->
<div class="row">
  Prescription:<br>
  <textarea name="prescription" rows="5"></textarea>
</div>

<!-- REFERRED -->
<div class="row">
  Referred by:
  <input type="text" name="referred">
</div>

<!-- FOLLOW UP -->
<div class="row">
  Follow up:
  <input type="text" name="followup">
</div>

<button type="submit" class="btn">Save + PDF</button>

<!-- SUCCESS MESSAGE -->
<div id="msg" style="color:green; margin-top:10px;"></div>

<!-- FOOTER -->
<div class="row">
  Doctor:
  <select name="doctor" id="doctor">
    <option value="doc1">Dr. Aya</option>
    <option value="doc2">Dr. Juan</option>
  </select>
</div>

</div>
</form>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwlCQ6JZwL4Z0EuOHQTddKOiz-wBfchozjwgEl8_uE9n1gpEn_5f6hzAZIcOjiKMB7Ojg/exec";

// GET ROW
const params = new URLSearchParams(window.location.search);
const row = params.get("row");

document.getElementById("rowInput").value = row;

// LOAD DATA
fetch(API_URL)
.then(res=>res.json())
.then(data=>{
  let r = data[row-1];

  document.getElementById("name").innerText = r[2] || "";
  document.getElementById("age").innerText = computeAge(r[4]);
  document.getElementById("sex").innerText = r[6] || "";
  document.getElementById("address").innerText = r[3] || "";
  document.getElementById("date").innerText = new Date().toLocaleDateString();
});

// SUCCESS MESSAGE
document.querySelector("form").addEventListener("submit", function(){
  document.getElementById("msg").innerHTML = "✅ Saved successfully!";
});

// AGE
function computeAge(bday){
  if(!bday) return "";
  let d = new Date(bday);
  if(isNaN(d)) return "";
  return new Date().getFullYear() - d.getFullYear();
}

</script>

</body>
</html>
