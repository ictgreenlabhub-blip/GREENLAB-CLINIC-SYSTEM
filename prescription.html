<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prescription</title>

<style>
body{
  background:#f4f6f9;
  font-family: Arial;
}

.paper{
  width:8.5in;
  min-height:11in;
  margin:auto;
  background:white;
  padding:40px 60px;
}

.header{
  text-align:center;
}

.title{
  font-size:22px;
  font-weight:bold;
  color:#2e7d32;
}

.row{
  margin-top:20px;
}

.line{
  border-bottom:1px solid black;
  display:inline-block;
  min-width:200px;
}

textarea{
  width:100%;
  border:none;
  border-bottom:1px solid black;
  outline:none;
  font-size:16px;
  background:transparent;
}

input, select{
  border:none;
  border-bottom:1px solid black;
  outline:none;
  font-size:16px;
  background:transparent;
}

.btn{
  margin-top:30px;
  padding:10px 20px;
  background:#2e7d32;
  color:white;
  border:none;
  cursor:pointer;
}

.footer{
  margin-top:80px;
  text-align:right;
}
</style>

</head>

<body>

<form action="https://script.google.com/macros/s/AKfycbyrWmvulNj3gbpj68tBNcrG8x2hH47NqpY-Aaadb12So38TW8U5XPrWiboaglh6zlhjfA/exec" method="POST" target="_blank">

<input type="hidden" name="action" value="saveWithPDF">
<input type="hidden" name="row" id="rowInput">

<div class="paper">

<!-- HEADER -->
<div class="header">
  <div class="title">GREEN LAB CLINIC AND WELLNESS HUB</div>
  Purok 4, Apokon Tagum City<br>
  Globe: 0905-240-6557
</div>

<!-- INFO -->
<div class="row">
  Patient Name: <span id="name"></span> |
  Age: <span id="age"></span> |
  Sex: <span id="sex"></span>
</div>

<div class="row">
  Address: <span id="address"></span> |
  Date: <span id="date"></span>
</div>

<!-- PROCEDURE -->
<div class="row">
  Procedure:
  <select name="procedure" id="procedure">
    <option>Select</option>
    <option>X-RAY</option>
    <option>LAB</option>
    <option>ULTRASOUND</option>
    <option>ECG</option>
  </select>
</div>

<!-- PRESCRIPTION -->
<div class="row">
  Prescription:<br>
  <textarea name="prescription" id="prescription" rows="5"></textarea>
</div>

<!-- REFERRED -->
<div class="row">
  Referred by:
  <input type="text" name="referred" id="referred">
</div>

<!-- FOLLOW UP -->
<div class="row">
  Follow up:
  <input type="text" name="followup" id="followup">
</div>

<button type="submit" class="btn">Save + PDF</button>

<!-- FOOTER -->
<div class="footer">
  Dr. AYA DANIKA A. ALTERADO MD<br>
  LIC NO: 0142226<br>
  PTR NO: 2165087
</div>

</div>
</form>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyrWmvulNj3gbpj68tBNcrG8x2hH47NqpY-Aaadb12So38TW8U5XPrWiboaglh6zlhjfA/exec";

// GET ROW
const params = new URLSearchParams(window.location.search);
const row = params.get("row");

// SET ROW
document.getElementById("rowInput").value = row;

// LOAD DATA
fetch(API_URL)
.then(res=>res.json())
.then(data=>{

  let r = data[row - 1];

  document.getElementById("name").innerText = r[2] || "";
  document.getElementById("age").innerText = computeAge(r[4]);
  document.getElementById("sex").innerText = r[6] || "";
  document.getElementById("address").innerText = r[3] || "";
  document.getElementById("date").innerText = new Date().toLocaleDateString();

});

// AGE
function computeAge(bday){
  if(!bday) return "";
  let d = new Date(bday);
  if(isNaN(d)) return "";
  return new Date().getFullYear() - d.getFullYear();
}

</script>

</body>
</html>
