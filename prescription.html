<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prescription</title>

<style>
body{
  background:#f4f6f9;
  font-family: Arial;
}

.paper{
  width:8.5in;
  height:11in;
  margin:auto;
  background:white;
  padding:40px 60px;
}

.line{
  border-bottom:1px solid black;
  display:inline-block;
  min-width:200px;
}

textarea, input, select{
  border:none;
  border-bottom:1px solid black;
  background:transparent;
  font-size:16px;
  width:250px;
}

.btn{
  margin-top:30px;
  padding:10px 20px;
  background:#2e7d32;
  color:white;
  border:none;
  cursor:pointer;
}
</style>

</head>

<body>

<form action="https://script.google.com/macros/s/AKfycbyrWmvulNj3gbpj68tBNcrG8x2hH47NqpY-Aaadb12So38TW8U5XPrWiboaglh6zlhjfA/exec" method="POST" target="_blank">

<!-- HIDDEN -->
<input type="hidden" name="action" value="saveWithPDF">
<input type="hidden" name="row" id="rowInput">

<div class="paper">

<h2>GREEN LAB CLINIC AND WELLNESS HUB</h2>

<p>
Patient Name: <span id="name"></span> |
Age: <span id="age"></span> |
Sex: <span id="sex"></span>
</p>

<p>
Address: <span id="address"></span> |
Date: <span id="date"></span>
</p>

<p>
Procedure:
<select name="procedure" id="procedure">
<option>Select</option>
<option>X-RAY</option>
<option>LAB</option>
<option>ULTRASOUND</option>
<option>ECG</option>
</select>
</p>

<p>
Prescription:<br>
<textarea name="prescription" id="prescription" rows="5"></textarea>
</p>

<p>
Referred by:
<input type="text" name="referred" id="referred">
</p>

<p>
Follow up:
<input type="text" name="followup" id="followup">
</p>

<button type="submit" class="btn">Save + PDF</button>

</div>
</form>

<script>

// 👉 PALITAN MO ITO (same URL sa Apps Script mo)
const API_URL = "https://script.google.com/macros/s/AKfycbyrWmvulNj3gbpj68tBNcrG8x2hH47NqpY-Aaadb12So38TW8U5XPrWiboaglh6zlhjfA/exec";

// GET ROW FROM URL
const params = new URLSearchParams(window.location.search);
const row = params.get("row");

// SET ROW SA FORM
document.getElementById("rowInput").value = row;

// LOAD DATA
fetch(API_URL)
.then(res=>res.json())
.then(data=>{

  let r = data[row - 1];

  document.getElementById("name").innerText = r[2] || "";
  document.getElementById("age").innerText = computeAge(r[4]);
  document.getElementById("sex").innerText = r[6] || "";
  document.getElementById("address").innerText = r[3] || "";
  document.getElementById("date").innerText = new Date().toLocaleDateString();

});

// AGE FUNCTION
function computeAge(bday){
  if(!bday) return "";
  let d = new Date(bday);
  if(isNaN(d)) return "";
  return new Date().getFullYear() - d.getFullYear();
}

</script>

</body>
</html>
