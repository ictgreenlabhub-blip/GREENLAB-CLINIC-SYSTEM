<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secretary Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    background: linear-gradient(180deg, #c4e479, #16a395);
    padding: 25px 15px;
    color: rgb(26, 10, 10);
}
table {
  font-size: 12px;
}
table th, table td {
  padding:4px 6px !important;
  vertical-align: middle;
}
#table {
  white-space: nowrap;
}
.box {
  overflow-x: auto;
}

.logo {
    text-align: center;
    margin-bottom: 80px;
}

.logo img {
    width: 120px;
}

/* MENU */
.menu {
    margin-top: 20px;
}

.menu a {
    display: block;
    padding: 15px 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    color: rgb(20, 1, 1);
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover {
    background: rgba(255,255,255,0.2);
    padding-left: 20px;
}

/* CONTENT */
.content {
    margin-left: 270px;
    padding: 40px;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">
        <img src="Green-Logo.png">
    </div>

    <div class="menu">
        <a href="index.html">🏠 Home</a>
        <a href="patient.html">🧑 Patient Form</a>
        <a href="doctor.html">👨‍⚕️ Doctor</a>
        <a href="secretary.html">📋 Secretary</a>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="box">

        <h4 class="mb-3">Secretary Panel</h4>

        <input type="text" id="search" class="form-control mb-3" placeholder="🔍 Search patient...">

        <table id="table" class="table table-bordered table-sm"></table>

    </div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxFOQixOtBwLDwCoaxFAhwHorFuQeLNxuvXUtmlP5N-8GMR3tfDqNDMwjmChKSU7_TScg/exec"; // IMPORTANT

function loadData(){

fetch(API_URL)
.then(res => res.text()) // 👉 gawing text muna para safe
.then(text => {

console.log("RAW:", text); // debug

let rows = JSON.parse(text); // parse manually

let html = "<thead><tr>";

// header
for(let j=0;j<=11;j++){
  html += `<th>${rows[0][j]}</th>`;
}

html += "<th>Schedule</th><th>Meet</th><th>Sent</th>";
html += "</tr></thead><tbody>";

for(let i=1;i<rows.length;i++){
  let row = rows[i];

  html += "<tr>";

  for(let j=0;j<=11;j++){
    html += `<td>${row[j] || ""}</td>`;
  }

  html += `<td>
    <input type="datetime-local"
    class="schedule"
    data-id="${i}"
    value="${formatDate(row[13])}">
  </td>`;

  html += `<td>${row[14] ? `<a href="${row[14]}" target="_blank">Open</a>` : ""}</td>`;
  html += `<td>${row[15] || ""}</td>`;

  html += "</tr>";
}

html += "</tbody>";

document.getElementById("table").innerHTML = html;

})
.catch(err=>{
console.error("ERROR:", err);
alert("May error — check console (F12)");
});

}

function formatDate(val){
  if(!val) return "";
  let d = new Date(val);
  if(isNaN(d)) return "";
  return d.toISOString().slice(0,16);
}

// update schedule
document.addEventListener("change", function(e){

if(e.target.classList.contains("schedule")){

fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({
action:"schedule",
id:e.target.dataset.id,
value:e.target.value
})
}).then(()=> loadData());

}

});

loadData();
</script>


</body>
</html>
